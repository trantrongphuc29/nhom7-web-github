name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "FrontendWeb/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontendWeb

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Fix react-scripts permission
        run: chmod +x node_modules/.bin/react-scripts

      - name: Build React app
        run: CI=false npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FE_FTP_HOST }}
          username: ${{ secrets.FE_FTP_USER }}
          password: ${{ secrets.FE_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./FrontendWeb/build/
          server-dir: /htdocs/